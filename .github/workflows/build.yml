name: Build EA8300 ImmortalWrt Passwall2

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare build environment
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev \
          libssl-dev python3-distutils rsync unzip zlib1g-dev file wget

      - name: Clone ImmortalWrt
        run: |
          git clone --depth=1 --branch openwrt-25.12 https://github.com/immortalwrt/immortalwrt.git source

      - name: Add Passwall2 feeds
        run: |
          cd source
          echo "src-git passwall2 https://github.com/xiaorouji/openwrt-passwall2.git" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure EA8300
        run: |
          cd source
          cp ../config.seed .config
          make defconfig

      - name: Build firmware
        run: |
          cd source
          make -j$(nproc) V=s

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: EA8300-ImmortalWrt-Passwall2
          path: source/bin/targets/ipq40xx/generic/
